name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUMMARY_PAT }} 
        
      - name: Generate Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_PAT }}
        with:
          USERNAME: ${{ github.repository_owner }}
          AUTO_PUSH: false
          
      - name: Commit & Push Generated Files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-generated profile summary cards"
            # This line downloads any changes made by your 3D graph workflow before pushing!
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
